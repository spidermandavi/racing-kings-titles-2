<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Racing Kings Titles</title>
  <link rel="stylesheet" href="css/global.css">
  
</head>
<body>
  <header class="top-bar">
    <div class="nav-left">
      <button class="icon-btn" id="backBtn" aria-label="Go back">&lt;</button>
      <button class="icon-btn" id="forwardBtn" aria-label="Go forward">&gt;</button>
    </div>
    <div class="nav-right">
      <button class="icon-btn" id="menuBtn" aria-label="Open menu">☰ Menu</button>
    </div>
  </header>

  <main>
    <h1>Racing Kings Titles</h1>
    <p class="subtitle">Choose a section to explore players, profiles, search results, titles, and background information about Racing Kings Titles.</p>

    <section class="grid" id="optionsGrid"></section>

    <nav id="menuPanel" class="menu-panel" aria-label="Quick Menu"></nav>
  </main>

  <script>
    const pages = [
      { slug: 'players', label: 'Players', desc: 'View leaderboards, players and rankings.' },
      { slug: 'leaderboard', label: 'Leaderboard', desc: 'Browse titled Racing Kings players.' },
      { slug: 'profile', label: 'Profile', desc: 'See profiles and stats.' },
      { slug: 'search', label: 'Search', desc: 'Find races, titles, and players.' },
      { slug: 'titles', label: 'Titles', desc: 'Titles and requirements.' },
      { slug: 'about', label: 'About', desc: 'Learn what Racing Kings Titles is about.' }
    ];

    const optionsGrid = document.getElementById('optionsGrid');
    const menuPanel = document.getElementById('menuPanel');

    pages.forEach((page) => {
      const card = document.createElement('a');
      card.href = `${page.slug}.html`;
      card.className = 'option';
      card.innerHTML = `<h2>${page.label}</h2><p>${page.desc}</p>`;
      optionsGrid.appendChild(card);

      const link = document.createElement('a');
      link.href = `${page.slug}.html`;
      link.textContent = page.label;
      menuPanel.appendChild(link);
    });

    document.getElementById('menuBtn').addEventListener('click', () => {
      menuPanel.classList.toggle('open');
    });

    document.getElementById('backBtn').addEventListener('click', () => history.back());
    document.getElementById('forwardBtn').addEventListener('click', () => history.forward());
  </script>
</body>
</html>
