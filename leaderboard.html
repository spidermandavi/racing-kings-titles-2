<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RK Leaderboard</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.78);
      --accent: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left,
        #1e293b,
        #0b1120 55%,
        #020617);

      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 0.9rem 1rem;

      backdrop-filter: blur(8px);

      background: rgba(2, 6, 23, 0.6);

      border-bottom:
        1px solid rgba(148, 163, 184, 0.2);
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 0.6rem;
    }

    .icon-btn {
      border: 1px solid rgba(148,163,184,0.4);

      background: rgba(30,41,59,0.7);

      color: var(--text);

      border-radius: 10px;

      padding: 0.45rem 0.8rem;

      cursor: pointer;

      font-size: 1rem;
    }

    .icon-btn:hover {
      border-color: var(--accent);
    }

    .menu-panel {
      display: none;

      margin: 1rem;

      padding: 0.8rem;

      border-radius: 12px;

      background: rgba(15, 23, 42, 0.8);

      border:
        1px solid rgba(148,163,184,0.28);
    }

    .menu-panel.open {
      display: block;
    }

    .menu-panel a {
      color: var(--text);
      text-decoration: none;
      margin-right: 1rem;
    }

    main {
      width: min(1000px, 92%);
      margin: 2rem auto;
    }

    h1 {
      margin-top: 0;
    }

    .player-card {
      background: var(--card);

      border:
        1px solid rgba(148,163,184,0.2);

      border-radius: 16px;

      padding: 1rem;

      margin-bottom: 1rem;
    }

    .player-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .username {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;

      margin-top: 0.8rem;
    }

    .title-badge {
      padding: 0.35rem 0.7rem;

      border-radius: 999px;

      font-size: 0.85rem;

      font-weight: 700;
    }

    .elite {
      background: #7c3aed;
    }

    .grand {
      background: #dc2626;
    }

    .master {
      background: #2563eb;
    }

    .candidate {
      background: #0891b2;
    }

    .candidate-light {
      background: #0f766e;
    }

    .intermediate {
      background: #65a30d;
    }

    .beginner {
      background: #6b7280;
    }

    .special {
      background: #f59e0b;
      color: black;
    }

    .description {
      margin-top: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .date-list {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

<header class="top-bar">
  <div class="nav-left">
    <button class="icon-btn" id="backBtn">&lt;</button>
    <button class="icon-btn" id="forwardBtn">&gt;</button>
  </div>

  <div class="nav-right">
    <button class="icon-btn" id="menuBtn">☰ Menu</button>
  </div>
</header>

<nav id="menuPanel" class="menu-panel"></nav>

<main>
  <h1>Titled Player Leaderboard</h1>

  <div id="leaderboard"></div>
</main>

<script src="leaderboard.js"></script>

</body>
</html>
