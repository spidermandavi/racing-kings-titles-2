<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Racing Kings Titles - Players</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.82);
      --card-2: rgba(30, 41, 59, 0.8);
      --accent: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #4ade80;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      padding: 1.2rem;
    }

    .card {
      width: min(850px, 96%);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 1.4rem;
      background: var(--card);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    #status { color: var(--muted); margin: 0.2rem 0 1rem; }

    .player-row {
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      margin-bottom: 0.8rem;
      background: var(--card-2);
      overflow: hidden;
    }

    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 0.9rem;
    }

    .player-link { font-weight: 700; }

    .rating {
      color: var(--ok);
      font-weight: 600;
      white-space: nowrap;
    }

    .player-details {
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.35s ease, padding 0.35s ease;
      padding: 0 0.9rem;
      border-top: 1px solid transparent;
    }

    .player-details.open {
      max-height: 280px;
      opacity: 1;
      padding: 0.75rem 0.9rem 0.9rem;
      border-top-color: rgba(148, 163, 184, 0.25);
    }

    .player-details ul {
      margin: 0 0 0.7rem;
      padding-left: 1.1rem;
      line-height: 1.5;
    }

    .detail-actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border-radius: 9px;
      padding: 0.45rem 0.75rem;
      font-size: 0.92rem;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover { border-color: var(--accent); text-decoration: none; }
    .top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1rem;
  backdrop-filter: blur(8px);
  background: rgba(2, 6, 23, 0.6);
  border-bottom: 1px solid rgba(148, 163, 184, 0.2);
  width: 100%;
}

.nav-left,
.nav-right {
  display: flex;
  gap: 0.6rem;
}

.icon-btn {
  border: 1px solid rgba(148, 163, 184, 0.4);
  color: var(--text);
  background: rgba(30, 41, 59, 0.7);
  border-radius: 10px;
  padding: 0.45rem 0.8rem;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease;
}

.icon-btn:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}

.menu-panel {
  position: fixed;
  top: 70px;
  right: 1rem;
  z-index: 99;
  border: 1px solid rgba(148, 163, 184, 0.28);
  border-radius: 12px;
  padding: 0.8rem;
  background: rgba(15, 23, 42, 0.95);
  display: none;
  backdrop-filter: blur(10px);
}

.menu-panel.open {
  display: block;
}

.menu-panel a {
  display: block;
  color: var(--text);
  text-decoration: none;
  margin: 0.4rem 0;
}

.menu-panel a:hover {
  color: var(--accent);
}
  </style>
</head>
<body>

<header class="top-bar">
  <div class="nav-left">
    <button class="icon-btn" id="backBtn">&lt;</button>
    <button class="icon-btn" id="forwardBtn">&gt;</button>
  </div>

  <div class="nav-right">
    <button class="icon-btn" id="menuBtn">☰ Menu</button>
  </div>
</header>

<nav id="menuPanel" class="menu-panel"></nav>
  
  <main style="display:grid; place-items:center; padding:1.2rem;">
<section class="card">
    <h1>Players</h1>
    <p id="status">Loading top Racing Kings players from Lichess…</p>
    <div id="playersList"></div>
    <p><a href="index.html">← Back to Home</a></p>
  </section>
  
<script>
  const playersList = document.getElementById('playersList');
  const statusEl = document.getElementById('status');

  // ===== LOADING OVERLAY =====
  const loader = document.createElement('div');

  loader.innerHTML = `
    <div class="spinner"></div>
    <div id="loadingText">Loading players... 0%</div>
  `;

  Object.assign(loader.style, {
    position: 'fixed',
    inset: '0',
    background: 'rgba(15,23,42,0.82)',
    display: 'flex',
    flexDirection: 'column',
    justifyContent: 'center',
    alignItems: 'center',
    gap: '1rem',
    zIndex: '9999',
    backdropFilter: 'blur(6px)',
    transition: 'opacity 0.4s ease'
  });

  const spinnerStyle = document.createElement('style');
  spinnerStyle.textContent = `
    .spinner {
      width: 56px;
      height: 56px;
      border: 5px solid rgba(255,255,255,0.15);
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loadingText {
      color: white;
      font-size: 1rem;
    }
  `;

  document.head.appendChild(spinnerStyle);
  document.body.appendChild(loader);

  const loadingText = document.getElementById('loadingText');

  // ===== HELPERS =====

  function formatPercent(value) {
    if (!Number.isFinite(value)) return 'N/A';
    return `${value.toFixed(1)}%`;
  }

  function getSiteTitle(user) {
    return user.profile?.rkSiteTitle || 'None';
  }

  // ===== RENDER SINGLE PLAYER =====

  function renderPlayer(user, index) {
    const rk = user.perfs?.racingKings || {};
    const games = rk.games || 0;

    const rkStats = user.rkPerfStats || {};
    const wins = rkStats.win || 0;
    const winRate = games ? (wins / games) * 100 : Number.NaN;

    const row = document.createElement('article');
    row.className = 'player-row';

    const username = user.username || user.id || 'Unknown';
    const rating = rk.rating ?? 'N/A';
    const highest = rk?.highest?.int ?? 'N/A';
    const lichessTitle = user.title || 'None';
    const siteTitle = getSiteTitle(user);

    row.innerHTML = `
      <div class="row-top">
        <span>${index + 1}. <a class="player-link" href="#">${username}</a></span>
        <span class="rating">${rating}</span>
      </div>

      <div class="player-details">
        <ul>
          <li><strong>Lichess title:</strong> ${lichessTitle}</li>
          <li><strong>Site title:</strong> ${siteTitle}</li>
          <li><strong>Racing Kings games:</strong> ${games}</li>
          <li><strong>Winrate:</strong> ${formatPercent(winRate)}</li>
          <li><strong>Highest rating:</strong> ${highest}</li>
        </ul>

        <div class="detail-actions">
          <a class="btn"
             href="https://lichess.org/@/${encodeURIComponent(username)}"
             target="_blank">
             Lichess Profile
          </a>
        </div>
      </div>
    `;

    const link = row.querySelector('.player-link');
    const details = row.querySelector('.player-details');

    link.addEventListener('click', (e) => {
      e.preventDefault();
      details.classList.toggle('open');
    });

    playersList.appendChild(row);
  }

  // ===== MENU =====

const pages = [
  { slug: 'index', label: 'Home' },
  { slug: 'players', label: 'Players' },
  { slug: 'profile', label: 'Profile' },
  { slug: 'search', label: 'Search' },
  { slug: 'titles', label: 'Titles' },
  { slug: 'about', label: 'About' }
];

const menuPanel = document.getElementById('menuPanel');

pages.forEach((page) => {
  const link = document.createElement('a');
  link.href = `${page.slug}.html`;
  link.textContent = page.label;
  menuPanel.appendChild(link);
});

document.getElementById('menuBtn')
  .addEventListener('click', () => {
    menuPanel.classList.toggle('open');
  });

document.getElementById('backBtn')
  .addEventListener('click', () => history.back());

document.getElementById('forwardBtn')
  .addEventListener('click', () => history.forward());
  
  // ===== MAIN LOADING =====

  async function loadPlayers() {
    try {
      statusEl.textContent = 'Loading top Racing Kings players...';

      const topRes = await fetch('https://lichess.org/api/player/top/10/racingKings', {
        headers: { Accept: 'application/json' }
      });

      if (!topRes.ok) {
        throw new Error('Failed to load leaderboard.');
      }

      const topData = await topRes.json();
      const users = topData.users || [];

      let loaded = 0;

      // Progressive loading
      const promises = users.map(async (u, index) => {

        const detailRes = await fetch(
          `https://lichess.org/api/user/${encodeURIComponent(u.id)}`
        );

        const perfRes = await fetch(
          `https://lichess.org/api/user/${encodeURIComponent(u.id)}/perf/racingKings`
        );

        let detail = {};
        let perf = {};

        if (detailRes.ok) detail = await detailRes.json();
        if (perfRes.ok) perf = await perfRes.json();

        const finalUser = {
          ...u,
          ...detail,
          rkPerfStats: perf.stat || {}
        };

        // Render IMMEDIATELY
        renderPlayer(finalUser, index);

        loaded++;

        const percent = Math.round((loaded / users.length) * 100);

        loadingText.textContent =
          `Loading players... ${percent}%`;

        statusEl.textContent =
          `Loaded ${loaded} of ${users.length} players`;
      });

      await Promise.all(promises);

      statusEl.textContent = 'Top 10 Racing Kings players loaded.';

      // Remove spinner smoothly
      loader.style.opacity = '0';

      setTimeout(() => {
        loader.remove();
      }, 400);

    } catch (error) {

      statusEl.textContent = error.message;

      loadingText.textContent = 'Loading failed';

      setTimeout(() => {
        loader.remove();
      }, 1200);
    }
  }

  loadPlayers();
</script>
</main>
</body>
</html>
