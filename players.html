<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Racing Kings Titles - Players</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.82);
      --card-2: rgba(30, 41, 59, 0.8);
      --accent: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #4ade80;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      padding: 1.2rem;
    }

    .card {
      width: min(850px, 96%);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 1.4rem;
      background: var(--card);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    #status { color: var(--muted); margin: 0.2rem 0 1rem; }

    .player-row {
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      margin-bottom: 0.8rem;
      background: var(--card-2);
      overflow: hidden;
    }

    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 0.9rem;
    }

    .player-link { font-weight: 700; }

    .rating {
      color: var(--ok);
      font-weight: 600;
      white-space: nowrap;
    }

    .player-details {
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.35s ease, padding 0.35s ease;
      padding: 0 0.9rem;
      border-top: 1px solid transparent;
    }

    .player-details.open {
      max-height: 280px;
      opacity: 1;
      padding: 0.75rem 0.9rem 0.9rem;
      border-top-color: rgba(148, 163, 184, 0.25);
    }

    .player-details ul {
      margin: 0 0 0.7rem;
      padding-left: 1.1rem;
      line-height: 1.5;
    }

    .detail-actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border-radius: 9px;
      padding: 0.45rem 0.75rem;
      font-size: 0.92rem;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover { border-color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <section class="card">
    <h1>Players</h1>
    <p id="status">Loading top Racing Kings players from Lichess…</p>
    <div id="playersList"></div>
    <p><a href="index.html">← Back to Home</a></p>
  </section>

  <script>
    const playersList = document.getElementById('playersList');
    const statusEl = document.getElementById('status');

    function formatPercent(value) {
      if (!Number.isFinite(value)) return 'N/A';
      return `${value.toFixed(1)}%`;
    }

    function getSiteTitle(user) {
      return user.profile?.rkSiteTitle || 'None';
    }

    async function fetchTopPlayers() {
      const topRes = await fetch('https://lichess.org/player/top/10/racingKings', {
        headers: { Accept: 'application/json' }
      });
      if (!topRes.ok) throw new Error('Could not fetch top player list from Lichess.');

      const topData = await topRes.json();
      const users = topData.users || [];

      const enrichedUsers = await Promise.all(users.map(async (u) => {
        const detailRes = await fetch(`https://lichess.org/api/user/${encodeURIComponent(u.id)}`);
        const perfRes = await fetch(`https://lichess.org/api/user/${encodeURIComponent(u.id)}/perf/racingKings`);

        let detail = {};
        let perf = {};

        if (detailRes.ok) detail = await detailRes.json();
        if (perfRes.ok) perf = await perfRes.json();

        return { ...u, ...detail, rkPerfStats: perf.stat || {} };
      }));

      return enrichedUsers;
    }

    function renderPlayers(users) {
      if (!users.length) {
        statusEl.textContent = 'No players returned by Lichess right now.';
        return;
      }

      statusEl.textContent = 'Top 10 Racing Kings players on Lichess:';

      users.forEach((user, index) => {
        const rk = user.perfs?.racingKings || {};
        const games = rk.games || 0;
        const rkStats = user.rkPerfStats || {};
        const wins = rkStats.win || 0;
        const winRate = games ? (wins / games) * 100 : Number.NaN;

        const row = document.createElement('article');
        row.className = 'player-row';

        const username = user.username || user.id || 'Unknown';
        const rating = rk.rating ?? 'N/A';
        const highest = rk?.highest?.int ?? 'N/A';
        const lichessTitle = user.title || 'None';
        const siteTitle = getSiteTitle(user);

        row.innerHTML = `
          <div class="row-top">
            <span>${index + 1}. <a class="player-link" href="#">${username}</a></span>
            <span class="rating">${rating}</span>
          </div>
          <div class="player-details" id="details-${index}">
            <ul>
              <li><strong>Lichess title:</strong> ${lichessTitle}</li>
              <li><strong>Site title:</strong> ${siteTitle}</li>
              <li><strong>Racing Kings games:</strong> ${games}</li>
              <li><strong>Winrate (Racing Kings):</strong> ${formatPercent(winRate)}</li>
              <li><strong>Highest Racing Kings rating:</strong> ${highest}</li>
            </ul>
            <div class="detail-actions">
              <button class="btn" type="button">More</button>
              <a class="btn" href="https://lichess.org/@/${encodeURIComponent(username)}" target="_blank" rel="noopener noreferrer">See Lichess profile</a>
            </div>
          </div>
        `;

        const link = row.querySelector('.player-link');
        const details = row.querySelector('.player-details');
        link.addEventListener('click', (event) => {
          event.preventDefault();
          details.classList.toggle('open');
        });

        playersList.appendChild(row);
      });
    }

    fetchTopPlayers()
      .then(renderPlayers)
      .catch((error) => {
        statusEl.textContent = `Error: ${error.message}`;
      });
  </script>
</body>
</html>
